# Publish to PyPI when a version tag is pushed.
#
# Workflow:
#   1. Create a git tag:  git tag -a v0.1.1 -m "v0.1.1: description"
#   2. Push it:           git push origin v0.1.1
#   3. This workflow automatically:
#      a. Builds the sdist and wheel
#      b. Publishes to PyPI via trusted publishing (OIDC)
#      c. Creates a GitHub Release from the tag
#
# Uses PyPI Trusted Publisher (OIDC) — no API tokens needed.
# Configure once at: https://pypi.org/manage/project/spyder-ai-assistant/settings/publishing/

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history for version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create releases
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes
